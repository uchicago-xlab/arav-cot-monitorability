# Qwen self-host catalog for vLLM (consumed by serve_qwen.py).
# Each entry: HF repo + the vLLM args that matter for THIS project (reasoning exposure + thinking
# toggle + enough context for 8k-token traces). Edit freely; VERIFY the hf_id on huggingface.co
# before launching (repo names drift — esp. the newest qwen3.5 / *-Thinking-2507 checkpoints).
#
# WHY self-host (vs OpenRouter): vLLM gives us, reliably, the three things the actor layer needs and
# that OpenRouter providers kept breaking on —
#   1. raw reasoning exposure   -> --reasoning-parser splits <think>…</think> into `reasoning_content`
#   2. prefill / no-CoT arm      -> OpenAI API `continue_final_message=true` (honored, unlike alibaba)
#   3. thinking DISABLE          -> chat_template_kwargs={"enable_thinking": false} (true rtoks=0)
# …plus stability (no 19h wedges) and ANY size, including the dense scale ladder for Follow-up C.
#
# gpu_hint = a sane (count × VRAM) for bf16; tp = tensor-parallel size (set = #GPUs you give it).
# reasoning_parser: "qwen3" on recent vLLM (>=0.6.4); fall back to "deepseek_r1" if your build lacks it.

defaults:
  dtype: bfloat16
  max_model_len: 32768          # 8k-token traces fit comfortably; raise if you batch long prompts
  reasoning_parser: qwen3
  gpu_memory_utilization: 0.90

# ── Qwen3 DENSE ladder — the clean architecture-constant scale axis for Follow-up C ──
qwen3-1.7b:   { hf_id: Qwen/Qwen3-1.7B,  tp: 1, gpu_hint: "1× 24GB (4090/L4/A10)" }
qwen3-4b:     { hf_id: Qwen/Qwen3-4B,    tp: 1, gpu_hint: "1× 24GB" }
qwen3-8b:     { hf_id: Qwen/Qwen3-8B,    tp: 1, gpu_hint: "1× 24-48GB (A10/A6000)" }
qwen3-14b:    { hf_id: Qwen/Qwen3-14B,   tp: 1, gpu_hint: "1× 48-80GB (A6000/A100)" }
qwen3-32b:    { hf_id: Qwen/Qwen3-32B,   tp: 2, gpu_hint: "2× 48GB or 1× 80GB" }

# ── Qwen3 MoE thinking checkpoints (the *-Thinking-2507 line the roster already references) ──
qwen3-30b-a3b:   { hf_id: Qwen/Qwen3-30B-A3B-Thinking-2507,   tp: 2, gpu_hint: "2× 48GB / 1× 80GB" }
qwen3-235b-a22b: { hf_id: Qwen/Qwen3-235B-A22B-Thinking-2507, tp: 8, gpu_hint: "8× 80GB (H100/A100)" }

# ── Qwen3.5 (the actor that was infeasible on OpenRouter — self-host it here) ──
# VERIFY this repo id on HF before launch; A10B = ~10B active of a 122B MoE.
qwen3_5-122b: { hf_id: Qwen/Qwen3.5-122B-A10B, tp: 4, gpu_hint: "4× 80GB (or 2× 80GB w/ --quantization fp8)" }
