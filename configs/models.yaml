    provider: baidu/fp8                              # REPINNED 2026-06-30 (was novita/fp8): bench (scripts/bench_deepseek_providers.py) — baidu 2254 tok/s @conc24 (0 fail) vs novita 1426 (novita WEDGED under sustained 5k-gen load); baidu honors prefill + raw reasoning. NB deepseek OVER-REASONS (runs to max_tokens every gen, often no <answer> even @8k; effort:low/reasoning.max_tokens IGNORED) → weak §3.1 actor regardless of provider. Recommended run: --concurrency 24 --reasoning-floor 8000. alts: gmicloud/fp8, novita/fp8, wandb/fp8
    cot_access: native_raw                            # PROVISIONAL — all endpoints advertise reasoning/include_reasoning; CONFIRM RAW (not summary) via probe
    reasoning_enabled: true
    tier: faithful_hints_gradient
    necessity: todo                                   # NOT load-bearing until Phase-0 verifies (CLAUDE.md guardrail)
    uplift_set: null
    experiments: [hints, gradient, oversight, followup_a]   # WIRED for all experiments; run phase0_deepseek_v4_flash.py BEFORE the sweep
    notes: "DeepSeek V4 Flash — added 2026-06-26 (user) as a fast replacement for the slow ~1T kimi_k2_thinking; same independent-lab cross-family-robustness role (CLAUDE.md), but a 'flash' MoE. PHASE-0 PROBE REQUIRED (scripts/phase0_deepseek_v4_flash.py): (1) raw faithful reasoning exposure (reasoning field, not summary), (2) prefill works for the no-CoT arm, (3) per-model necessity, (4) confirm/repin provider+quant. cot_access=native_raw is provisional until the probe passes."
