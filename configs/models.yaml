    tier: faithful_agentic
    necessity: todo
    uplift_set: null
    experiments: [hints, oversight, followup_a]     # hints = §3.1 headline (with-CoT judged; structured no-CoT necessity arm)
    notes: "Opus 4.8 via the Anthropic API. RESOLVED 2026-06-26 (claude-api ref): assistant PREFILL returns 400 on Opus 4.8 on the Anthropic API too (removed across the 4.6+/Fable family), so the prefill no-CoT arm is impossible on EITHER provider. ENFORCEABLE alternative for §3.1/§3.2: thinking-off + structured-output forcing (output_config.format, single-letter enum schema) as the no-CoT arm — supported, but a DIFFERENT mechanism than the prefill all other actors use, so Opus necessity/decode-uplift carries a comparability footnote. PENDING: solver support for a per-actor no_cot_mechanism=structured_output, plus drop temperature (Opus 4.8 direct 400s on temperature/top_p/top_k). Agentic §6/Follow-up A work now (no prefill needed)."
