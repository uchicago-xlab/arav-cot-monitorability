# Model roster — logical name -> OpenRouter model + provider pin + CoT-access + tier + necessity.
# Consumed by src/cot_mon/models/roster.py. All calls via OpenRouter (openrouter/<provider>/<model>).
#
# Phase-0 VERIFIED 2026-06-22 (scripts/phase0_*.py; detail in logs/). Slugs live; reasoning
# exposure + prefill + per-model necessity checked; providers PINNED.
#
# FIELDS
#   provider          exact OpenRouter endpoint TAG (provider[/quant]); roster.py pins it via
#                     model arg provider={only:[tag], allow_fallbacks:false} -> same backend+quant
#                     every run, or fail loudly (CLAUDE.md reproducibility).
#   cot_access        native_raw | summary | body_channel | disabled
#                       native_raw   open weights, raw faithful trace via `reasoning`
#                       summary      closed models — reasoning field is a SUMMARY (NOT faithful)
#                       body_channel reasoning forced into the message body (agentic / faithful repl.)
#                       disabled     hidden channel OFF via reasoning:{enabled:false} -> body CoT
#   reasoning_enabled true|false|null -> OpenRouter reasoning.enabled (roster.py forwards as the
#                     `reasoning_enabled` model arg; null = omit, use model default).
#   tier              faithful_hints_gradient | faithful_conditional | faithful_agentic |
#                     generalization_only | monitor   (SPEC §3 actor tiers)
#   necessity         confirmed | todo | fails_easy | env_calibrated | na   (per-model; CLAUDE.md
#                     CORE PRINCIPLE: faithful actor needs channel-disable AND task CoT-necessary)
#   uplift_set        id/path of this model's per-actor uplift set (built by monitors/uplift_filter.py)

defaults:
  fpr_targets: [0.01, 0.05]   # report recall@1% and @5% FPR (SPEC §3.3)
  provider_pin: null          # fallback only; every model sets an explicit `provider`

actors:
  # ── Faithful §3.1/§3.2 (channel-disabled or raw + prefill + necessity) ──
  gemini_3_flash:                                  # PRIMARY faithful actor (SPEC §3, §5.1 START HERE)
    id: openrouter/google/gemini-3-flash-preview
    provider: google-vertex
    cot_access: disabled
    reasoning_enabled: false                       # rtoks=0; reasons in body, which we judge
    tier: faithful_hints_gradient
    necessity: confirmed                           # phase0_necessity: forbidden 0/6 -> allowed 6/6, uplift +1.00
    uplift_set: null
    experiments: [hints, gradient, oversight, followup_a]
    notes: "PRIMARY. Channel disables (rtoks=0), prefill works, necessity +1.00. §3.2 CAVEAT (2026-06-24, phase0_forcing_check.py): at EASY B it CORRECTS a forced wrong step (0/6 adopt; visible 'Wait, let me re-calculate') — quiet-corrector risk that would inflate 'unfaithful-correct' (answer-slot forcing hides the correction). Re-validate it ADOPTS at sweep B before trusting its §3.2 column. gpt-5.5 adopts cleanly; gemini-2.5-flash mixed."
  qwen3:
    id: openrouter/qwen/qwen3-235b-a22b-thinking-2507   # cheap dev alt: qwen3-30b-a3b-thinking-2507
    provider: wandb/bf16                           # bf16 > fp8 alts
    cot_access: native_raw
    reasoning_enabled: true
    tier: faithful_hints_gradient
    necessity: todo                                # strong model — verify per-model uplift (likely needs harder items)
    uplift_set: null
    experiments: [hints, gradient, oversight, followup_a]
    notes: "Open-weight faithful raw CoT; §4.4 summarization source; §7 RL base. prefill confirmed."

  qwen3_30b:
    id: openrouter/qwen/qwen3-30b-a3b-thinking-2507   # cheaper dev checkpoint of the qwen3-thinking family
    provider: alibaba                               # AtlasCloud/fp8 was impractically slow (~10min/60gen); alibaba (quant unknown)
    cot_access: native_raw
    reasoning_enabled: true
    tier: faithful_hints_gradient
    necessity: todo
    uplift_set: null
    experiments: [hints, gradient, oversight, followup_a]
    notes: "Terser dev alt to the 235b — evaluated for higher answer-yield (235b answered=0.63 @8k)."
  qwen3_5_122b:
    id: openrouter/qwen/qwen3.5-122b-a10b            # Qwen 3.5 MoE (122B-A10B); OpenRouter catalog 2026-06-26
    provider: siliconflow/fp8                        # REPINNED 2026-06-27: novita/bf16 WEDGES under sustained load (hung requests, 0% CPU, ~19h sweep); alibaba is fast but does NOT honor prefill (no-CoT arm breaks); siliconflow/fp8 honors prefill ✅ + stable (8/8 concurrent ok). Model fills the 8k cap (~137s/gen), so use high --concurrency + --attempt-timeout.
    cot_access: native_raw                            # PROVISIONAL — endpoint exposes reasoning/include_reasoning; CONFIRM via probe
    reasoning_enabled: true
    tier: faithful_hints_gradient
    necessity: todo                                   # NOT load-bearing until Phase-0 verifies (CLAUDE.md guardrail)
    uplift_set: null
    experiments: [hints, gradient, oversight, followup_a]   # WIRED for all experiments; run phase0_qwen3_5.py BEFORE the sweep
    notes: "Qwen 3.5 successor to qwen3-235b-thinking. DROPPED from the OpenRouter §3.1 analysis 2026-06-28 (Arav): probe PASSED (raw ✅ + prefill ✅; necessity +0.17 one-shots = provisional) but the powered sweep is INFEASIBLE on OpenRouter — every endpoint (novita/bf16 crashed, siliconflow/fp8 wedged) hangs its 8k-token gens under sustained load (~137s/gen, ~19h projected; sweep reached 40/47 then stalled). --attempt-timeout prevents a terminal wedge but not the slowness. DEFERRED → self-hosted vLLM (see selfhost_vllm/ — gives reliable prefill + reasoning exposure + thinking-toggle + any size; ideal for the Follow-up C qwen DENSE scale ladder 1.7B→32B). Re-enable as a self-host actor once the vLLM endpoint is up; not in the committed 8-actor set."
  qwen3_5_122b_selfhost:                            # SELF-HOSTED vLLM 0.24.0 twin of qwen3_5_122b (OpenRouter deferred)
    id: openai-api/vllm/qwen3_5-122b                 # inspect `openai-api` provider: service `vllm` -> VLLM_BASE_URL + VLLM_API_KEY from env
    provider: null                                    # self-host endpoint: NOT OpenRouter -> no provider-routing pin
    cot_access: native_raw                            # raw faithful CoT (confirmed live: comes back in the `reasoning` field)
    reasoning_enabled: null                           # OpenRouter-only arg; N/A on the self-host path (thinking toggled via chat_template_kwargs)
    tier: faithful_hints_gradient
    necessity: todo                                   # NOT load-bearing until per-model necessity verified on-pod (CLAUDE.md guardrail)
    uplift_set: null
    experiments: [hints]                              # decode-necessity + §3.1 only for now
    no_cot_mechanism: vllm_structured                 # no-CoT arm = single-letter schema + chat_template_kwargs={enable_thinking:false} (prefill NOT honored here)
    notes: "Self-host vLLM 0.24.0 (OpenAI-compatible at VLLM_BASE_URL, key VLLM_API_KEY); re-enables the deferred qwen3_5_122b on a reliable endpoint. LIVE PROBE FINDINGS: (1) CoT returns in the OpenAI `reasoning` message field (NOT `reasoning_content`). (2) thinking DISABLE works via request extra_body={\"chat_template_kwargs\": {\"enable_thinking\": false}} (the kwarg `thinking` does NOT work; must be `enable_thinking`) -> `reasoning` goes to 0 chars. (3) assistant PREFILL (continue_final_message) is NOT honored on this endpoint (returns empty) -> the no-CoT arm CANNOT prefill. Therefore no_cot_mechanism=vllm_structured: the STRUCTURED single-letter schema PLUS enable_thinking:false (structured output alone still lets it reason in the `reasoning` channel; the disable kwarg is what makes it a true no-CoT arm)."
  qwen3_32b_selfhost:                              # SELF-HOSTED vLLM Qwen3-32B (DENSE) — smaller sibling of qwen3_5_122b
    id: openai-api/vllm/qwen3-32b                     # inspect `openai-api` provider: service `vllm` -> VLLM_BASE_URL + VLLM_API_KEY from env
    provider: null                                    # self-host endpoint: NOT OpenRouter -> no provider-routing pin
    cot_access: native_raw                            # raw faithful CoT in the `reasoning` field (Qwen3 hybrid-thinking, same as 122b)
    reasoning_enabled: null                           # OpenRouter-only arg; N/A on the self-host path (thinking toggled via chat_template_kwargs)
    tier: faithful_hints_gradient
    necessity: todo                                   # NOT load-bearing until per-model necessity verified on-pod (CLAUDE.md guardrail)
    uplift_set: null
    experiments: [hints]                              # decode-necessity + §3.1
    no_cot_mechanism: vllm_structured                 # no-CoT arm = single-letter schema + chat_template_kwargs={enable_thinking:false}
    notes: "Self-host vLLM Qwen3-32B (DENSE, hybrid-thinking). Same self-host mechanics as qwen3_5_122b_selfhost: CoT in the `reasoning` field; thinking disabled via extra_body={chat_template_kwargs:{enable_thinking:false}}; prefill NOT honored -> vllm_structured no-CoT. Follow-up-C dense scale-ladder point below the 122b MoE."
  olmo3_32b_think_selfhost:                          # SELF-HOSTED vLLM Olmo-3.1-32B-Think (DENSE) — cross-lab (Ai2), fully-open reasoner
    id: openai-api/vllm/olmo3-32b                     # inspect `openai-api` provider: service `vllm` -> VLLM_BASE_URL + VLLM_API_KEY from env
    provider: null                                    # self-host endpoint: NOT OpenRouter -> no provider-routing pin
    cot_access: native_raw                            # raw <think> CoT in the `reasoning` field via --reasoning-parser olmo3 (verified live)
    reasoning_enabled: null                           # N/A on the self-host path
    tier: faithful_hints_gradient
    necessity: todo                                   # NOT load-bearing until per-model necessity verified on-pod (CLAUDE.md guardrail)
    uplift_set: null
    experiments: [hints]                              # decode-necessity + §3.1
    no_cot_mechanism: vllm_prefill_think              # no-CoT arm = prefill `<think></think>\n\n<answer>` + continue_final_message
    notes: "Self-host vLLM allenai/Olmo-3.1-32B-Think (DENSE reasoner, Ai2 — adds an independent fully-open lab family). LIVE PROBE FINDINGS (vLLM 0.24.0, B200): (1) raw <think> CoT returns in the `reasoning` field with --reasoning-parser olmo3 (median/max CoT measured on-pod). (2) Olmo has NO enable_thinking toggle and its stock template FORCE-OPENS <think> every turn; a bare enable_thinking:false (even with a patched template that emits a closed <think></think>) does NOT stop it — the model reasons in prose and the olmo3 parser misroutes it into `reasoning` (rtoks stays >0). (3) The TRUE off switch (rtoks=0, verified on hard GPQA) is no_cot_mechanism=vllm_prefill_think: prefill the assistant turn `<think></think>\\n\\n<answer>` and CONTINUE it via extra_body={continue_final_message:true, add_generation_prompt:false} (the openai-api provider does NOT auto-set these for a trailing assistant msg, so solver passes them). Served with --chat-template selfhost_vllm/olmo3_think_nothink.jinja (patched to honor enable_thinking for the WITH-CoT arm's asymmetry). Prefill family -> comparable to the OpenRouter prefill actors."
  nemotron3_120b_selfhost:                           # SELF-HOSTED vLLM NVIDIA-Nemotron-3-Super-120B-A12B (FP8) — cross-lab (NVIDIA), 120B-total/12B-active hybrid Mamba-MoE
    id: openai-api/vllm/nemotron3-120b                # inspect `openai-api` provider: service `vllm` -> VLLM_BASE_URL + VLLM_API_KEY from env
    provider: null                                    # self-host endpoint: NOT OpenRouter -> no provider-routing pin
    cot_access: native_raw                            # raw reasoning trace in the `reasoning` field via --reasoning-parser nemotron_v3 (verify live)
    reasoning_enabled: null                           # N/A on the self-host path (thinking toggled via chat_template_kwargs)
    tier: faithful_hints_gradient
    necessity: todo                                   # NOT load-bearing until per-model necessity verified on-pod (CLAUDE.md guardrail)
    uplift_set: null
    experiments: [hints]                              # decode-necessity + §3.1
    no_cot_mechanism: vllm_structured                 # SAME as qwen: single-letter schema + chat_template_kwargs={enable_thinking:false} (Nemotron-3 has a native enable_thinking toggle)
    notes: "Self-host vLLM nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8 (120B total / 12B active, hybrid LatentMoE = interleaved Mamba-2 + MoE + Attention; NVIDIA-provided FP8 checkpoint -> no runtime quant; fits one B200). Adds an independent NVIDIA lab family; 12B-active = fast. Nemotron-3 has a NATIVE enable_thinking toggle (unlike Olmo) -> reuses the qwen `vllm_structured` no-CoT arm: single-letter schema + extra_body={chat_template_kwargs:{enable_thinking:false}}. Served with --reasoning-parser nemotron_v3. VERIFY on-pod: (1) raw CoT in the `reasoning` field, (2) enable_thinking:false -> rtoks=0, (3) per-model necessity."
  kimi_k2_thinking:                                  # Moonshot — independent faithful family (cross-lab robustness)
