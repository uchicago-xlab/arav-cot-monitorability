    cot_access: native_raw
    reasoning_enabled: true
    tier: faithful_hints_gradient
    necessity: todo
    uplift_set: null
    experiments: [hints, oversight, followup_a]     # NOT gradient: §3.2 prefill-forcing INVALID (see notes)
    notes: "Open-weight faithful raw CoT; fallback substrate if qwen3 unavailable. §3.2 (gradient) REMOVED — DEFINITIVE: reasoning is MANDATORY on all 17 OpenRouter gpt-oss-120b endpoints (can't disable the re-deriving analysis channel), so a forced wrong intermediate is adopted 0/33 across 15 providers × 2 vehicles (body + reasoning-field), incl. 'let's correct' re-derivation (2026-06-24, scripts/phase0_gptoss_adoption.py + phase0_forcing_check.py). Out of §3.2."
