    provider: novita/bf16                            # bf16 endpoint (project pref bf16>fp8>int4); alts: atlas-cloud/int4, google-vertex
    cot_access: native_raw                            # PROVISIONAL — endpoint exposes reasoning/include_reasoning; CONFIRM via probe
    reasoning_enabled: true
    tier: faithful_hints_gradient
    necessity: todo                                   # NOT load-bearing until Phase-0 verifies (CLAUDE.md guardrail)
    uplift_set: null
    experiments: [hints, gradient, oversight, followup_a]   # WIRED for all experiments; run phase0_kimi_k2.py BEFORE the sweep
    notes: "Kimi K2 Thinking (Moonshot, ~1T MoE) — adds an independent lab family to a Google/OpenAI/Qwen-heavy roster (cross-family robustness, CLAUDE.md). DEFERRED 2026-06-26 (user): ~1T MoE too slow on novita for this sweep — superseded by deepseek_v4_flash (same independent-lab role, fast 'flash' MoE). Probe plumbing PASSED (raw ✅ + prefill ✅ at n=1) but excluded from the Steps 4–5 sweep. PHASE-0 PROBE (scripts/phase0_kimi_k2.py): (1) raw faithful reasoning exposure (reasoning field, not summary), (2) prefill works for the no-CoT arm, (3) per-model necessity, (4) confirm/repin provider+quant. cot_access=native_raw is provisional until the probe passes."
